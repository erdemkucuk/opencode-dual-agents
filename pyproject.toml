[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "S",   # flake8-security
    "RUF", # ruff-specific rules
    "T20", # flake8-print
]
ignore = [
    "S101",   # Use of assert (common in tests)
    "S104",   # Possible binding to all interfaces (common in docker/mcp)
    "S603",   # Subprocess call with untrusted input (checked manually)
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["T201", "S101", "S607"]
