networks:
  agents:
    driver: bridge

services:
  agent1:
    build: .
    environment:
      - AGENT_NAME=agent1
      - A2A_MARIO_URL=http://agent2:8000
    volumes:
      - ./agent1-config:/agent
    ports:
      - "4097:4096"   # opencode serve
      - "4100:8000"   # MCP SSE sidecar (bridge.py)
    networks:
      - agents

  agent2:
    build: .
    environment:
      - AGENT_NAME=agent2
    volumes:
      - ./agent2-config:/agent
    ports:
      - "4098:4096"   # opencode serve
      - "4099:8000"   # A2A HTTP sidecar (a2a_server.py)
    networks:
      - agents
